<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dodo training monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 24px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 15px; color: #fff; font-weight: 600; letter-spacing: 0.05em; }
  .stat { font-size: 13px; color: #888; }
  .stat span { color: #c8f06e; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #3a3a3a; flex-shrink: 0;
  }
  .dot.alive {
    background: #4caf50;
    box-shadow: 0 0 6px #4caf5088;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    gap: 20px;
  }

  #players {
    width: 100%;
    max-width: 1280px;
    display: flex;
    gap: 8px;
  }
  .player-wrap {
    flex: 1;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    position: relative;
    min-width: 0;
  }
  .player-wrap video { width: 100%; display: block; }
  .player-label {
    position: absolute;
    bottom: 8px; left: 12px;
    font-size: 11px;
    color: #ffffff99;
    background: #00000066;
    padding: 2px 7px;
    border-radius: 4px;
    pointer-events: none;
  }

  #empty-msg {
    padding: 80px 0;
    color: #444;
    font-size: 14px;
    text-align: center;
    line-height: 2;
  }

  #gallery {
    width: 100%;
    max-width: 1280px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .thumb {
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 6px;
    background: #1a1a1a;
    padding: 6px 12px;
    font-size: 12px;
    color: #888;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
    user-select: none;
  }
  .thumb:hover { border-color: #444; color: #ccc; }
  .thumb.active { border-color: #c8f06e; color: #c8f06e; }
</style>
</head>
<body>

<header>
  <div class="dot" id="status-dot"></div>
  <h1>dodo training monitor</h1>
  <div class="stat">iter <span id="stat-iter">—</span></div>
  <div class="stat">videos <span id="stat-count">0</span></div>
</header>

<main>
  <div id="players" style="display:none">
    <div class="player-wrap">
      <video id="video-front" controls autoplay muted playsinline></video>
      <div class="player-label">front</div>
    </div>
    <div class="player-wrap">
      <video id="video-side" controls autoplay muted playsinline></video>
      <div class="player-label">side</div>
    </div>
  </div>
  <div id="empty-msg">Waiting for first video&hellip;<br>Videos are recorded every 50 iterations.</div>
  <div id="gallery"></div>
</main>

<script>
// groups: { "iter_000050": { front: "iter_000050_front.mp4", side: "iter_000050_side.mp4" }, ... }
let groups = {};
let currentIter = null;

function iterLabel(key) {
  const m = key.match(/iter_(\d+)/);
  return m ? 'iter ' + parseInt(m[1]) : key;
}

function groupKey(filename) {
  return filename.replace(/_front\.mp4$/, '').replace(/_side\.mp4$/, '');
}

function playIter(key) {
  const g = groups[key];
  if (!g) return;
  currentIter = key;

  if (g.front) {
    const v = document.getElementById('video-front');
    v.src = '/videos/' + g.front;
    v.play().catch(() => {});
  }
  if (g.side) {
    const v = document.getElementById('video-side');
    v.src = '/videos/' + g.side;
    v.play().catch(() => {});
  }

  document.getElementById('players').style.display = '';
  document.getElementById('empty-msg').style.display = 'none';

  document.querySelectorAll('.thumb').forEach(t => {
    t.classList.toggle('active', t.dataset.key === key);
  });
}

function refreshList() {
  fetch('/api/videos')
    .then(r => r.json())
    .then(data => {
      document.getElementById('stat-count').textContent = data.videos.length;
      if (data.iteration !== null) {
        document.getElementById('stat-iter').textContent = data.iteration;
      }
      document.getElementById('status-dot').classList.toggle('alive', data.alive);

      // rebuild groups
      const newGroups = {};
      data.videos.forEach(f => {
        const key = groupKey(f);
        if (!newGroups[key]) newGroups[key] = {};
        if (f.includes('_front')) newGroups[key].front = f;
        else if (f.includes('_side')) newGroups[key].side = f;
      });

      if (JSON.stringify(newGroups) === JSON.stringify(groups)) return;
      groups = newGroups;

      const keys = Object.keys(groups).sort();

      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      [...keys].reverse().forEach(key => {
        const el = document.createElement('div');
        el.className = 'thumb' + (key === currentIter ? ' active' : '');
        el.dataset.key = key;
        el.textContent = iterLabel(key);
        el.onclick = () => playIter(key);
        gallery.appendChild(el);
      });

      if (keys.length > 0) {
        const latest = keys[keys.length - 1];
        if (currentIter === null || latest > currentIter) {
          playIter(latest);
        }
      }
    })
    .catch(() => {});
}

refreshList();
setInterval(refreshList, 1000);
</script>
</body>
</html>
